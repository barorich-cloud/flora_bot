<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verde Paradiso — Assistente</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:#1a1c18;
  font-family:'Jost',sans-serif;
  display:flex;align-items:center;justify-content:center;
}

.shell{
  width:100%;max-width:430px;
  height:100vh;max-height:820px;
  background:#faf9f5;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.45);
}
@media(min-width:500px){
  .shell{border-radius:22px;height:92vh}
}

/* HEADER */
.hd{
  background:#2a4226;
  padding:18px 18px 14px;
  display:flex;align-items:center;gap:13px;
  flex-shrink:0;
}
.av{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.hd-name{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:400;
  color:#e8e0d0;letter-spacing:.03em;
}
.hd-sub{
  font-size:11px;color:rgba(232,224,208,.5);
  margin-top:2px;letter-spacing:.05em;
  display:flex;align-items:center;gap:5px;
}
.online{
  width:7px;height:7px;border-radius:50%;
  background:#7ec87e;display:inline-block;
}

/* MESSAGES */
.msgs{
  flex:1;overflow-y:auto;
  padding:20px 16px;
  display:flex;flex-direction:column;gap:14px;
  background:#faf9f5;
}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:#d0c8b8;border-radius:3px}

.msg{display:flex;flex-direction:column;max-width:87%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end}

.bubble{
  padding:11px 15px;
  border-radius:16px;
  font-size:14px;line-height:1.65;
  font-weight:300;letter-spacing:.01em;
}
.msg.bot .bubble{
  background:#fff;
  border:1px solid #e4ddd0;
  color:#2a2a26;
  border-bottom-left-radius:4px;
}
.msg.user .bubble{
  background:#3d5c38;
  color:#e8f0e5;
  border-bottom-right-radius:4px;
}
.ts{
  font-size:10px;color:#b0a898;
  margin-top:3px;letter-spacing:.03em;
}
.msg.user .ts{text-align:right}

/* TYPING */
.typing{
  display:none;align-self:flex-start;
  background:#fff;border:1px solid #e4ddd0;
  border-radius:16px;border-bottom-left-radius:4px;
  padding:13px 17px;gap:5px;align-items:center;
}
.typing.on{display:flex}
.d{
  width:6px;height:6px;background:#9aad94;
  border-radius:50%;
  animation:bounce 1.3s infinite ease-in-out;
}
.d:nth-child(2){animation-delay:.18s}
.d:nth-child(3){animation-delay:.36s}
@keyframes bounce{
  0%,60%,100%{transform:translateY(0)}
  30%{transform:translateY(-5px)}
}

/* QUICK REPLIES */
.quick{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:0 16px 12px;
}
.qb{
  background:#fff;border:1px solid #c0b8a8;
  border-radius:20px;padding:6px 13px;
  font-size:12px;font-family:'Jost',sans-serif;
  font-weight:300;color:#4a5a40;cursor:pointer;
  letter-spacing:.02em;transition:background .15s;
}
.qb:active{background:#f0ece0}

/* INPUT */
.inp-row{
  display:flex;align-items:center;gap:9px;
  padding:12px 14px;
  border-top:1px solid #e4ddd0;
  background:#fff;flex-shrink:0;
}
textarea{
  flex:1;border:none;background:transparent;
  font-size:14px;font-family:'Jost',sans-serif;
  font-weight:300;color:#2a2a26;
  outline:none;resize:none;
  line-height:1.5;max-height:80px;
}
textarea::placeholder{color:#b8b0a0}
.send-btn{
  width:38px;height:38px;
  background:#3d5c38;border:none;
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s,transform .1s;
}
.send-btn:active{background:#4e7347;transform:scale(.93)}

/* FOOTER */
.footer{
  text-align:center;font-size:10px;
  color:#c0b8a8;padding:6px 0 10px;
  background:#fff;letter-spacing:.04em;
}
</style>
</head>
<body>

<div class="shell">

  <div class="hd">
    <div class="av">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a8c898" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a7 7 0 0 0-7 7c0 4.5 7 13 7 13s7-8.5 7-13a7 7 0 0 0-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
    </div>
    <div>
      <div class="hd-name">Verde Paradiso</div>
      <div class="hd-sub">
        <span class="online"></span>
        Assistente · online
      </div>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="msg bot">
      <div class="bubble">Benvenuto in Verde Paradiso.<br>Posso aiutarti con informazioni sui nostri servizi o raccogliere una richiesta di preventivo. Come posso esserti utile?</div>
      <div class="ts" id="wts"></div>
    </div>
    <div class="typing" id="typing">
      <div class="d"></div><div class="d"></div><div class="d"></div>
    </div>
  </div>

  <div class="quick" id="quick">
    <button class="qb" onclick="sq(this)">Servizi matrimoni</button>
    <button class="qb" onclick="sq(this)">Landscape design</button>
    <button class="qb" onclick="sq(this)">Abbonamenti floreali</button>
    <button class="qb" onclick="sq(this)">Richiedere un preventivo</button>
  </div>

  <div class="inp-row">
    <textarea id="inp" placeholder="Scrivi un messaggio…" rows="1"
      onkeydown="hk(event)" oninput="ar(this)"></textarea>
    <button class="send-btn" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#c8dfc0">
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="footer">Verde Paradiso &middot; powered by n8n + GPT-4o</div>

</div>

<script>
const WEBHOOK = 'https://baroarchive239.app.n8n.cloud/webhook/FLORA_BOT';
const sid = 'demo_' + Math.random().toString(36).substr(2, 9);

document.getElementById('wts').textContent = now();

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function ar(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function hk(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function sq(btn) {
  document.getElementById('quick').style.display = 'none';
  send(btn.textContent.trim());
}

function append(text, role) {
  const msgs = document.getElementById('msgs');
  const typing = document.getElementById('typing');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  const t = document.createElement('div');
  t.className = 'ts';
  t.textContent = now();
  wrap.appendChild(b);
  wrap.appendChild(t);
  msgs.insertBefore(wrap, typing);
  msgs.scrollTop = 99999;
}

async function send(override) {
  const inp = document.getElementById('inp');
  const text = override || inp.value.trim();
  if (!text) return;

  append(text, 'user');
  inp.value = '';
  inp.style.height = 'auto';

  const typing = document.getElementById('typing');
  typing.classList.add('on');
  document.getElementById('msgs').scrollTop = 99999;

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sid, message: text })
    });
    const data = await res.json();
    typing.classList.remove('on');
    const reply = data.reply || data.output || data.ai_response || '...';
    append(reply, 'bot');
  } catch (e) {
    typing.classList.remove('on');
    append('Connessione non disponibile. Scrivi a info@verdeparadiso.com', 'bot');
  }
}
</script>

</body>
</html>
